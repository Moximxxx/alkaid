name: ✨ 功能建议
description: 为摇光提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢提出功能建议 ✨
        请填写以下信息帮助我们理解你的需求。

  - type: textarea
    id: problem
    attributes:
      label: 🎯 相关痛点
      description: 这个功能解决了什么问题？
      placeholder: 当...时，我希望能够...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 期望方案
      description: 清晰简洁地描述你期望的实现方案
      placeholder: 建议实现...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 替代方案
      description: 你考虑过的其他方案
      placeholder: 也可以考虑...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: ⭐ 优先级
      description: 该功能的重要程度
      options:
        - "🔴 高 — 核心体验缺失"
        - "🟡 中 — 重要改进"
        - "🟢 低 — 锦上添花"
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: 🏗️ 影响层级
      description: 该功能影响哪一层？
      options:
        - "前端/UI（React 渲染进程）"
        - "业务逻辑（Electron 主进程）"
        - "运行时（Node.js / 基础设施）"
        - "全栈 / 不确定"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ 提交前确认
      options:
        - label: 我已搜索现有 Issues，未发现重复
          required: true
        - label: 该功能与项目定位（摄像头 AI 对话助手）契合
          required: true
